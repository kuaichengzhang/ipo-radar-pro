name: IPO Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '30 1 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '30 13 * * 1-5'

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run IPO Radar
        run: |
          python main.py

      - name: Commit reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Update IPO report" || echo "No report changes"
          git push
