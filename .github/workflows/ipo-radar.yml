name: IPO Radar

on:
  workflow_dispatch:

  schedule:
    # 北京时间09:30
    - cron: '30 1 * * 1-5'

    # 北京时间12:30
    - cron: '30 4 * * 1-5'

    # 北京时间17:30
    - cron: '30 9 * * 1-5'

    # 北京时间21:30
    - cron: '30 13 * * 1-5'

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run IPO Radar
        run: |
          python main.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: ipo-report
          path: reports/
